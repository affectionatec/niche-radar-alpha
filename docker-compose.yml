services:
  radar:
    build: .
    container_name: niche-radar
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: niche-radar-frontend
    ports:
      - "3000:3000"
    depends_on:
      - radar
    restart: unless-stopped

  db:
    image: docker.1panel.live/library/postgres:16-alpine
    container_name: niche-radar-db
    environment:
      POSTGRES_DB: niche_radar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    profiles: ["postgres"]

volumes:
  pgdata:
